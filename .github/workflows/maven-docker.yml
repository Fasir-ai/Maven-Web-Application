name: Maven Build and Docker Push

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build with Maven
      run: mvn clean package

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/maven-webapp:${{ github.run_number }} .
        docker tag ${{ secrets.DOCKER_USERNAME }}/maven-webapp:${{ github.run_number }} \
                   ${{ secrets.DOCKER_USERNAME }}/maven-webapp:latest

    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/maven-webapp:${{ github.run_number }}
        docker push ${{ secrets.DOCKER_USERNAME }}/maven-webapp:latest
